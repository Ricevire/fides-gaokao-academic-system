name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Build, Check and Test
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: root_password
          MYSQL_DATABASE: fides_gaokao_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot_password"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      NODE_ENV: test
      APP_NAME: fides-gaokao-academic-system
      APP_VERSION: 1.0.0
      PORT: 3000
      BODY_LIMIT: 2mb
      TRUST_PROXY: "false"

      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: root_password
      DB_NAME: fides_gaokao_test
      DB_AUTO_CREATE: "true"
      DB_CONNECTION_LIMIT: 10

      JWT_SECRET: github-actions-ci-secret-at-least-32-characters
      JWT_EXPIRES_IN: 8h
      CORS_ORIGINS: http://localhost:3000

      RATE_LIMIT_WINDOW_MS: 900000
      RATE_LIMIT_MAX: 300
      AUTH_RATE_LIMIT_MAX: 20

      ADMIN_INITIAL_PASSWORD: Admin@12345678

      AUDIT_EVENT_LOG_ENABLED: "true"
      AUDIT_ALERTS_ENABLED: "false"
      AUDIT_SLOW_API_ENABLED: "false"

      OIDC_ENABLED: "false"
      SMS_ENABLED: "false"
      LOG_LEVEL: error

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run CI
        run: npm run ci