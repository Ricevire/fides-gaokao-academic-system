# Nginx canary template for FIDES.
# Change weights to move traffic: 99/1 -> 95/5 -> 80/20 -> 50/50 -> 0/100.
# Roll back by setting green weight to 0 and blue weight to 100.

upstream fides_blue {
  server app-blue:3000 weight=100 max_fails=3 fail_timeout=10s;
  keepalive 32;
}

upstream fides_green {
  server app-green:3000 weight=1 max_fails=3 fail_timeout=10s;
  keepalive 32;
}

split_clients "${remote_addr}${http_user_agent}" $fides_canary_bucket {
  1% green;
  * blue;
}

map $cookie_fides_release $fides_release_pool {
  blue blue;
  green green;
  default $fides_canary_bucket;
}

server {
  listen 80;
  server_name jw.example.edu.cn;

  add_header X-FIDES-Release-Pool $fides_release_pool always;

  location = /health/live {
    proxy_pass http://fides_blue;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location = /health/ready {
    proxy_pass http://fides_blue;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location / {
    error_page 418 = @green_pool;
    if ($fides_release_pool = green) { return 418; }

    proxy_pass http://fides_blue;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Request-Id $request_id;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location @green_pool {
    proxy_pass http://fides_green;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Request-Id $request_id;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
